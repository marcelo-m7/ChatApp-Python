name: Dependency sync

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  check-dependency-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Setup uv
        uses: astral-sh/setup-uv@v3

      - name: Check pyproject/requirements synchronization
        run: ./scripts/check_requirements_sync.sh
